name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run tests
        run: go test ./...
      
      - name: Build Linux
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/sonovel-linux-amd64 ./cmd/sonovel
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonovel-linux-amd64
          path: bin/sonovel-linux-amd64
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Build Windows
        run: |
          go build -ldflags="-s -w" -o ./bin/sonovel-windows-amd64.exe ./cmd/sonovel
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonovel-windows-amd64
          path: bin/sonovel-windows-amd64.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Build macOS
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/sonovel-darwin-amd64 ./cmd/sonovel
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonovel-darwin-amd64
          path: bin/sonovel-darwin-amd64
          retention-days: 7

  release:
    needs: [test, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sonovel-*
          path: ./bin
          merge-multiple: true
      
      - name: List binaries
        run: ls -lh bin/
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/sonovel-linux-amd64
            bin/sonovel-windows-amd64.exe
            bin/sonovel-darwin-amd64
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Release ${{ github.event.inputs.tag || github.ref_name }}
            
            ### 📦 构建信息
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref }}
            
            ### 📄 更新内容
            - Linux: `bin/sonovel-linux-amd64`
            - Windows: `bin/sonovel-windows-amd64.exe`
            - macOS: `bin/sonovel-darwin-amd64`
            
            [View Changes](https://github.com/opso-code/sonovel-go/compare/${{ github.event.release && github.event.release.tag_name || '' }}..${{ github.sha }})
