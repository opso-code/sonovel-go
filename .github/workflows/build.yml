name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run tests
        run: go test ./...
      
      - name: Build Linux
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/go-sonovel-linux-amd64 ./cmd/sonovel
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sonovel-linux-amd64
          path: bin/go-sonovel-linux-amd64
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Build Windows
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ./bin/go-sonovel-windows-amd64.exe ./cmd/sonovel
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sonovel-windows-amd64
          path: bin/go-sonovel-windows-amd64.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Install dependencies
        run: go mod download
      
      - name: Build macOS
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/go-sonovel-darwin-amd64 ./cmd/sonovel
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sonovel-darwin-amd64
          path: bin/go-sonovel-darwin-amd64
          retention-days: 7

  release:
    needs: [test, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: go-sonovel-*
          path: ./bin
          merge-multiple: true
      
      - name: Copy rules to release
        run: |
          mkdir -p ./release
          cp -r rules ./release/
          cp config.toml ./release/ 2>/dev/null || true
          cp README.md ./release/ 2>/dev/null || true
          cp LICENSE ./release/ 2>/dev/null || true
      
      - name: Package release archives
        run: |
          cd ./release
          tar czf ../go-sonovel-linux-amd64.tar.gz go-sonovel-linux-amd64 rules/ README.md config.toml LICENSE 2>/dev/null || true
          zip -r ../go-sonovel-windows-amd64.zip go-sonovel-windows-amd64.exe rules/ README.md config.toml LICENSE 2>/dev/null || true
          tar czf ../go-sonovel-darwin-amd64.tar.gz go-sonovel-darwin-amd64 rules/ README.md config.toml LICENSE 2>/dev/null || true
      
      - name: List release files
        run: ls -lh ./release/
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            go-sonovel-linux-amd64.tar.gz
            go-sonovel-windows-amd64.zip
            go-sonovel-darwin-amd64.tar.gz
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Release ${{ github.event.inputs.tag || github.ref_name }}
            
            ### 📦 构建信息
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref }}
            
            ### 📄 更新内容
            - Linux: `go-sonovel-linux-amd64.tar.gz`
            - Windows: `go-sonovel-windows-amd64.zip`
            - macOS: `go-sonovel-darwin-amd64.tar.gz`
            
            [View Changes](https://github.com/opso-code/sonovel-go/compare/${{ github.event.release && github.event.release.tag_name || '' }}..${{ github.sha }})
