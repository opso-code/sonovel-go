name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'  # 自动从 go.mod 读取版本
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Run tests
        run: go test ./... -v

      - name: Build and package all platforms
        run: |
          make dist

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./dist/*
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Release ${{ github.event.inputs.tag || github.ref_name }}

            ### 📦 构建信息
            - **Commit**: [`${{ github.sha }}`](https://github.com/opso-code/sonovel-go/commit/${{ github.sha }})
            - **Branch**: ${{ github.ref_name == 'main' && 'main (default)' || github.ref_name }}

            [View Changes](https://github.com/opso-code/sonovel-go/compare/${{ github.ref_name || '' }}..${{ github.sha }})
