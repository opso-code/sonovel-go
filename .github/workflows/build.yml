name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'  # 自动从 go.mod 读取版本
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Run tests
        run: go test ./... -v

      - name: Build all platforms (matrix)
        uses: actions/github-script@v7
        with:
          script: |
            const matrix = [
              { os: 'linux', arch: 'amd64' },
              { os: 'windows', arch: 'amd64' },
              { os: 'darwin', arch: 'amd64' },
            ];

            for (const m of matrix) {
              console.log(`Building ${m.os}-${m.arch}...`);
              core.exec(`GOOS=${m.os} GOARCH=${m.arch} CGO_ENABLED=0 go build -ldflags="-s -w" -o ./bin/${m.os}-${m.arch}/go-sonovel${m.os === 'windows' ? '.exe' : ''} ./cmd/sonovel`);
            }

      - name: List built binaries
        run: |
          ls -lh bin/*/

      # 使用 Makefile 进行打包（复用已有的 build-all 逻辑）
      - name: Create release archives using Makefile
        run: make dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            go-sonovel-linux-amd64.tar.gz
            go-sonovel-windows-amd64.zip
            go-sonovel-darwin-amd64.tar.gz
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Release ${{ github.event.inputs.tag || github.ref_name }}

            ### 📦 构建信息
            - **Commit**: [`${{ github.sha }}`](https://github.com/opso-code/sonovel-go/commit/${{ github.sha }})
            - **Branch**: ${{ github.ref_name == 'main' && 'main (default)' || github.ref_name }}

            ### 📄 下载

            <details>
              <summary>🔽 点击展开查看下载链接</summary>

            #### Linux x86_64 (amd64)
            - `go-sonovel-linux-amd64.tar.gz` (~500KB)
              ```bash
              tar xzf go-sonovel-linux-amd64.tar.gz
              ./go-sonovel --help
              ```

            #### Windows x86_64 (amd64)
            - `go-sonovel-windows-amd64.zip` (~500KB)
              ```powershell
              Expand-Archive -Path go-sonovel-windows-amd64.zip -DestinationPath .
              .\go-sonovel.exe --help
              ```

            #### macOS Intel x86_64 (amd64)
            - `go-sonovel-darwin-amd64.tar.gz` (~500KB)
              ```bash
              tar xzf go-sonovel-darwin-amd64.tar.gz
              ./go-sonovel --help
              ```

              </details>

            [View Changes](https://github.com/opso-code/sonovel-go/compare/${{ github.event.release && github.event.release.tag_name || '' }}..${{ github.sha }})
