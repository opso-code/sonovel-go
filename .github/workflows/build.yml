name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'
      - name: Run tests
        run: go test ./... -v

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Build Binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
          go build -ldflags="-s -w" \
          -o ./bin/go-sonovel ${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd/sonovel

      - name: Prepare Assets
        run: |
          mkdir -p ./dist/${{ matrix.os }}-${{ matrix.arch }}
          cp -r rules ./dist/${{ matrix.os }}-${{ matrix.arch }}/
          cp config.toml ./dist/${{ matrix.os }}-${{ matrix.arch }}/
          cp README.md ./dist/${{ matrix.os }}-${{ matrix.arch }}/

      - name: Package
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p ./dist/outputs
          if [ "${{ matrix.os }}" = "windows" ]; then
            (cd ./dist/${{ matrix.os }}-${{ matrix.arch }} && zip -qmr ../outputs/go-sonovel-${{ matrix.os }}-${{ matrix.arch }}-v${VERSION}.zip .)
          else
            tar czf ./dist/outputs/go-sonovel-${{ matrix.os }}-${{ matrix.arch }}-v${VERSION}.tar.gz -C ./dist/${{ matrix.os }}-${{ matrix.arch }} . --remove-files
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: ./dist/outputs/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./artifacts/**
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Release ${{ github.event.inputs.tag || github.ref_name }}

            ### 📦 构建信息
            - **Commit**: [`${{ github.sha }}`](https://github.com/opso-code/sonovel-go/commit/${{ github.sha }})
            - **Branch**: ${{ github.ref_name == 'main' && 'main (default)' || github.ref_name }}

            [View Changes](https://github.com/opso-code/sonovel-go/compare/${{ steps.previoustag.outputs.previous_tag }}..${{ github.event.inputs.tag || github.ref_name }})



